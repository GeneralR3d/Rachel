services:
  db:
    image: postgres:16
    container_name: rachel-db
    environment:
      POSTGRES_USER: rachel
      # Must match the password embedded in DATABASE_URL (.env). Falls back to
      # "rachel" if DB_PASSWORD is unset, preserving the old dev default.
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rachel}
      POSTGRES_DB: rachel
    ports:
      # Bind to loopback only — the DB never needs to be reachable from off-host.
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rachel -d rachel"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    container_name: rachel-neo4j
    environment:
      # neo4j/<password>. Falls back to "password" if NEO4J_PASSWORD is unset.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      # Bind to loopback only — 7687 is bolt (driver), 7474 is the HTTP browser.
      - "127.0.0.1:7687:7687"
      - "127.0.0.1:7474:7474"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Optional: run the app in a container too. By default just run `db` and
  # start the app locally with uv (see README). Uncomment to use.
  app:
    build: .
    image: rachel-app:latest
    container_name: rachel
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rachel:${DB_PASSWORD:-rachel}@db:5432/rachel
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      PYTHONUNBUFFERED: 1
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./anon.session:/app/anon.session
      - ./bot.session:/app/bot.session
      - ./graph_llm.png:/app/graph_llm.png
      - ./graph_userfacts.png:/app/graph_userfacts.png
      - ./graph_worldview.png:/app/graph_worldview.png
      - ./worldview.md:/app/worldview.md

volumes:
  pgdata:
  neo4jdata:
